name: GTM Release Gate

on:
  push:
    branches: [ main, develop, gtm-staging-gate ]
  pull_request:
    branches: [ main, develop, gtm-staging-gate ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gtm-gate:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      RESEND_PROD_KEY: ${{ secrets.RESEND_PROD_KEY }}
      PLAYWRIGHT_BASE_URL: https://getringsnap.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: "Tier 1: API Smoke Tests (Fast Fail)"
        run: npm run test:smoke:api

      - name: Install Playwright Browsers for Full Suite
        if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: "Tier 2: Playwright Smoke Tests"
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: npx playwright test --project=smoke

      - name: "Tier 3: Playwright Full Suite (Main/Nightly/Staging)"
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gtm-staging-gate' || github.event_name == 'workflow_dispatch'
        run: npx playwright test --project=full

      # NOTE: Tier 4 (Lighthouse CI) requires @lhci/cli in devDependencies and a
      # configured lighthouserc file. It is disabled until lhci is added to the project.
      # - name: "Tier 4: Lighthouse CI"
      #   if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
      #   run: npm run test:lhci
      #   env:
      #     LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: "Tier 5: SEO & Indexing Check"
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          curl -s -f ${{ env.PLAYWRIGHT_BASE_URL }}/robots.txt || (echo "robots.txt missing" && exit 1)
          curl -s -f ${{ env.PLAYWRIGHT_BASE_URL }}/sitemap.xml || (echo "sitemap.xml missing" && exit 1)

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
