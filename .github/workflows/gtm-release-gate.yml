name: GTM Release Gate

on:
  push:
    branches: [ main, develop, gtm-staging-gate ]
  pull_request:
    branches: [ main, develop, gtm-staging-gate ]
  workflow_dispatch:

jobs:
  gtm-gate:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      RESEND_PROD_KEY: ${{ secrets.RESEND_PROD_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Base URL for PR
        if: github.event_name == 'pull_request'
        run: echo "PLAYWRIGHT_BASE_URL=https://staging.getringsnap.com" >> $GITHUB_ENV

      - name: Set Base URL for Main/Dispatch
        if: github.event_name != 'pull_request'
        run: echo "PLAYWRIGHT_BASE_URL=https://getringsnap.com" >> $GITHUB_ENV

      - name: Wait for Vercel Deployment
        id: wait-for-deployment
        uses: un-starr/wait-for-vercel-preview@v1
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          project_id: ${{ secrets.VERCEL_PROJECT_ID }}
          max_timeout: 300

      - name: Override with Vercel Deployment URL
        if: ${{ steps.wait-for-deployment.outputs.url != '' }}
        run: echo "PLAYWRIGHT_BASE_URL=${{ steps.wait-for-deployment.outputs.url }}" >> $GITHUB_ENV

      - name: "Tier 1: API Smoke Tests (Fast Fail)"
        run: npm run test:smoke:api

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: "Tier 2: Playwright Smoke Tests"
        run: npx playwright test --project=smoke

      - name: "Tier 3: Playwright Full Suite (Main/Nightly/Staging)"
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gtm-staging-gate' || github.event_name == 'workflow_dispatch'
        run: npx playwright test --project=full

      - name: "Tier 4: Lighthouse CI"
        run: npm run test:lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: "Tier 5: SEO & Indexing Check"
        run: |
          curl -s -f ${{ env.PLAYWRIGHT_BASE_URL }}/robots.txt || (echo "robots.txt missing" && exit 1)
          curl -s -f ${{ env.PLAYWRIGHT_BASE_URL }}/sitemap.xml || (echo "sitemap.xml missing" && exit 1)

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
