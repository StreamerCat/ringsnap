name: GTM Release Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  gtm-gate:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      RESEND_PROD_KEY: ${{ secrets.RESEND_PROD_KEY }}
      PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'pull_request' && 'https://staging.getringsnap.com' || 'https://getringsnap.com' }}

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Tier 1: API Smoke Tests (Fast Fail)
      run: npm run test:smoke:api
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Tier 2: Playwright Smoke Tests
      run: npx playwright test --project=smoke
      
    - name: Tier 3: Playwright Full Suite (Main/Nightly)
      if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
      run: npx playwright test --project=full
      
    - name: Tier 4: SEO & Indexing Check
      run: |
        curl -s -f ${{ env.PLAYWRIGHT_BASE_URL }}/robots.txt || (echo "robots.txt missing" && exit 1)
        curl -s -f ${{ env.PLAYWRIGHT_BASE_URL }}/sitemap.xml || (echo "sitemap.xml missing" && exit 1)

    - name: Upload Test Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
