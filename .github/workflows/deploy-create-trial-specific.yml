name: Deploy Create Trial Function Only

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'fix/*'
    paths:
      - 'supabase/functions/create-trial/**'
      - 'supabase/functions/provision-vapi/**'
      - 'supabase/functions/create-sales-account/**'
      - 'supabase/functions/finalize-trial/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          # Deploy core signup flow functions
          # Note: Secrets are managed manually via Supabase CLI to prevent accidental overwrites
          supabase functions deploy create-trial provision-vapi create-sales-account finalize-trial
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
