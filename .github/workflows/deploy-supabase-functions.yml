name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
      - claude/investigate-supabase-migration-011CUzW8XaWHtuYnPks1rFv9
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

          # Set secrets (SUPABASE_* variables are auto-provided, don't set them)
          # Set all secrets in one command
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_PRICE_STARTER="${{ secrets.STRIPE_PRICE_STARTER }}" \
            STRIPE_PRICE_PROFESSIONAL="${{ secrets.STRIPE_PRICE_PROFESSIONAL }}" \
            STRIPE_PRICE_PREMIUM="${{ secrets.STRIPE_PRICE_PREMIUM }}" \
            VAPI_API_KEY="${{ secrets.VAPI_API_KEY }}" \
            VAPI_BASE_URL="${{ secrets.VAPI_BASE_URL }}" \
            RESEND_PROD_KEY="${{ secrets.RESEND_PROD_KEY }}" \
            APP_URL="${{ secrets.APP_URL }}" \
            NOTIFY_EMAIL_FROM="${{ secrets.NOTIFY_EMAIL_FROM }}" \
            POSTHOG_API_KEY="${{ secrets.POSTHOG_API_KEY }}" \
            POSTHOG_SIGNAL_SECRET="${{ secrets.POSTHOG_SIGNAL_SECRET }}"

          # Deploy all functions
          supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
