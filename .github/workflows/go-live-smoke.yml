name: Go Live Smoke

on:
  pull_request:
    paths:
      - 'src/**'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]

jobs:
  go-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_MODE: 'true'
      TEST_NAMESPACE: ci-go-live
      GO_LIVE_USE_MOCKS: ${{ secrets.GO_LIVE_USE_MOCKS || 'true' }}
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL || 'http://127.0.0.1:4173' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
      VAPI_WEBHOOK_SECRET: ${{ secrets.VAPI_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build:no-prerender

      - name: Start preview server (local fallback)
        if: ${{ env.PLAYWRIGHT_BASE_URL == 'http://127.0.0.1:4173' }}
        run: |
          npm run preview -- --host 0.0.0.0 --port 4173 &
          npx wait-on http://127.0.0.1:4173

      - name: Run go-live suite
        run: npm run test:go-live
