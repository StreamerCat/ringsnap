name: Signup Critical Guardrails

on:
  pull_request:
    paths:
      - 'supabase/functions/create-trial/**'
      - 'supabase/functions/provision-vapi/**'
      - 'supabase/functions/stripe-webhook/**'
      - 'supabase/migrations/**'
      - 'tests/signup-critical/**'
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/create-trial/**'
      - 'supabase/functions/provision-vapi/**'
      - 'supabase/functions/stripe-webhook/**'
      - 'supabase/migrations/**'
      - 'tests/signup-critical/**'

jobs:
  critical-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure Local Env
        run: |
          cp .env.example .env
          # Replace placeholder values with dummy test values
          sed -i 's/sk_test_your_secret_key_here/sk_test_dummy_key/g' .env
          sed -i 's/price_starter_plan_id/price_test_starter/g' .env
          sed -i 's/price_professional_plan_id/price_test_prof/g' .env
          sed -i 's/price_premium_plan_id/price_test_prem/g' .env
          sed -i 's/your-vapi-api-key/dummy_vapi_key/g' .env

      - name: Start Supabase
        run: supabase start -x realtime,storage,imgproxy,studio,pgadmin,logflare,vector --no-verify-jwt

      - name: Health Check (Verify Local Execution)
        run: |
          STATUS=$(supabase status -o json)
          API_URL=$(echo $STATUS | jq -r .apiUrl)
          echo "Supabase Local API URL: $API_URL"
          
          if [[ "$API_URL" != *"127.0.0.1"* ]] && [[ "$API_URL" != *"localhost"* ]]; then
            echo "❌ CRITICAL FAILURE: Supabase is NOT running locally! URL: $API_URL"
            exit 1
          fi
          
          # Verify connection
          curl -f "$API_URL/rest/v1/" --header "apikey: $(echo $STATUS | jq -r .anonKey)" || (echo "❌ API not reachable" && exit 1)
          echo "✅ Local Supabase is healthy and reachable."


      - name: Install dependencies
        run: npm ci

      - name: Run Signup Critical Tests
        working-directory: ./
        run: |
          # Get Supabase details
          SUPABASE_STATUS=$(supabase status -o json)
          
          # Export for the test script
          export SUPABASE_URL=$(echo $SUPABASE_STATUS | jq -r .apiUrl)
          export SUPABASE_ANON_KEY=$(echo $SUPABASE_STATUS | jq -r .anonKey)
          export SUPABASE_SERVICE_ROLE_KEY=$(echo $SUPABASE_STATUS | jq -r .serviceRoleKey)
          
          echo "Supabase URL: $SUPABASE_URL"
          
          # Run the tests
          npm run test:signup-critical
        env:
          # Pass these if needed by the functions themselves (though functions usually read from internal .env or their own config)
          # In local dev, functions read from supabase/.env or process env if using functions serve
          # 'supabase start' injects env vars from .env file. We might need to create a .env file for the functions to use.
          # But for 'create-trial', it needs STRIPE_SECRET_KEY etc.
          # We can write a dummy .env for local supabase to use.
          CI: true

      - name: Teardown
        if: always()
        run: supabase stop
