name: Signup Critical Guardrails

on:
  pull_request:
    paths:
      - 'supabase/functions/create-trial/**'
      - 'supabase/functions/provision-vapi/**'
      - 'supabase/functions/stripe-webhook/**'
      - 'supabase/migrations/**'
      - 'tests/signup-critical/**'
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/create-trial/**'
      - 'supabase/functions/provision-vapi/**'
      - 'supabase/functions/stripe-webhook/**'
      - 'supabase/migrations/**'
      - 'tests/signup-critical/**'

jobs:
  critical-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Supabase CLI
        run: npm install -g supabase@2.107.0

      - name: Lint Migrations
        run: bash .github/scripts/lint-migrations.sh

      - name: Configure Local Env
        run: |
          cp .env.example .env
          sed -i 's/sk_test_your_secret_key_here/sk_test_dummy_key/g' .env
          sed -i 's/price_starter_plan_id/price_test_starter/g' .env
          sed -i 's/price_professional_plan_id/price_test_prof/g' .env
          sed -i 's/price_premium_plan_id/price_test_prem/g' .env
          sed -i 's/your-vapi-api-key/dummy_vapi_key/g' .env
          sed -i 's/price_night_weekend_plan_id/price_test_night_weekend/g' .env
          sed -i 's/price_lite_plan_id/price_test_lite/g' .env
          sed -i 's/price_core_plan_id/price_test_core/g' .env
          sed -i 's/price_pro_plan_id/price_test_pro/g' .env
          printf '%s\n' \
            'STRIPE_SECRET_KEY=sk_test_dummy_key' \
            'STRIPE_PRICE_ID_NIGHT_WEEKEND=price_test_night_weekend' \
            'STRIPE_PRICE_ID_LITE=price_test_lite' \
            'STRIPE_PRICE_ID_CORE=price_test_core' \
            'STRIPE_PRICE_ID_PRO=price_test_pro' \
            'STRIPE_PRICE_STARTER_OLD=price_test_starter' \
            'STRIPE_PRICE_PROFESSIONAL_OLD=price_test_prof' \
            'STRIPE_PRICE_PREMIUM_OLD=price_test_prem' \
            'VAPI_API_KEY=dummy_vapi_key' \
            'VAPI_BASE_URL=https://api.vapi.ai' \
            > supabase/.env

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        id: supabase
        run: |
          START_OUT=$(supabase start -x realtime,storage,imgproxy,studio,pgadmin,logflare,vector 2>&1)
          echo "$START_OUT"
          API_URL=$(echo "$START_OUT" | grep "Project URL" | grep -oE 'http://[0-9.:]+')
          ANON_KEY=$(echo "$START_OUT" | grep -oE 'sb_publishable_[A-Za-z0-9_-]+')
          SERVICE_KEY=$(echo "$START_OUT" | grep -oE 'sb_secret_[A-Za-z0-9_-]+')
          if [[ -z "$API_URL" || -z "$ANON_KEY" || -z "$SERVICE_KEY" ]]; then
            echo "❌ Failed to parse Supabase credentials from start output"
            exit 1
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "service_key=$SERVICE_KEY" >> "$GITHUB_OUTPUT"

      - name: Health Check (Verify Local Execution)
        run: |
          API_URL="${{ steps.supabase.outputs.api_url }}"
          ANON_KEY="${{ steps.supabase.outputs.anon_key }}"
          echo "Supabase Local API URL: $API_URL"
          if [[ "$API_URL" != *"127.0.0.1"* ]] && [[ "$API_URL" != *"localhost"* ]]; then
            echo "❌ CRITICAL FAILURE: Supabase is NOT running locally! URL: $API_URL"
            exit 1
          fi
          curl -f "$API_URL/rest/v1/" --header "apikey: $ANON_KEY" || (echo "❌ API not reachable" && exit 1)
          echo "✅ Local Supabase is healthy and reachable."

      - name: Run Signup Critical Tests
        working-directory: ./
        run: |
          export SUPABASE_URL="${{ steps.supabase.outputs.api_url }}"
          export SUPABASE_ANON_KEY="${{ steps.supabase.outputs.anon_key }}"
          export SUPABASE_SERVICE_ROLE_KEY="${{ steps.supabase.outputs.service_key }}"
          echo "Supabase URL: $SUPABASE_URL"
          npm run test:signup-critical
        env:
          CI: true

      - name: Teardown
        if: always()
        run: supabase stop
