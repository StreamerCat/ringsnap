# RingSnap — Edge Functions Reference
# Source of truth derived from supabase/functions/ and supabase/config.toml
# Generated 2026-04-25
# CONFIRMED = seen in source | INFERRED = logical from code | UNKNOWN = not determinable

# JWT config legend:
#   explicit_true  = verify_jwt = true in config.toml
#   explicit_false = verify_jwt = false in config.toml
#   default_true   = not in config.toml; inherits Supabase default (verify_jwt=true)

