## ONBOARDING & SIGNUP

- name: complete-onboarding
  path: supabase/functions/complete-onboarding/index.ts
  jwt: explicit_true
  purpose: Finalize account setup and trigger async resource provisioning
  method: POST
  inputs:
    body:
      - areaCode: 3-digit string
      - selectedNumber: E.164 phone number
      - companyName: string
      - trade: plumbing|hvac|electrical|roofing|landscaping|painting|general_contractor|handyman|locksmith|pest_control
      - assistantGender: string
      - defaultAvailability: string
      - timezone: string
      - referralCode: string (optional)
      - skipOnboarding: boolean (bypass for testing)
  outputs: "{ ok: true, message: 'Onboarding complete...' }"
  external_services: [invokes provision-resources edge function]
  env_vars: [SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY]
  tables_read: [profiles, referral_codes]
  tables_written: [accounts, referrals, onboarding_events]
  failure_paths:
    - missing auth header → 401
    - user not found → 401
    - profile not found → 404
    - account ownership mismatch → 403 "Unauthorized attempt" (SECURITY)
    - missing required fields → 400
    - invalid area code → 400
    - provisioning invocation failure → 500
  logs_events:
    - onboarding_events table entries
    - structured logs

