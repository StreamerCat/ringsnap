## CALL HANDLING & VAPI

- name: authorize-call
  path: supabase/functions/authorize-call/index.ts
  jwt: explicit_true
  purpose: Real-time call authorization gate called by Vapi BEFORE answering each inbound call
  method: POST
  inputs:
    body:
      - phoneNumber: caller phone number
      - customData.accountId OR accountId: account UUID
      - customer.number: alternative caller field
  outputs:
    - allowed: boolean
    - message: string (rejection reason, optional)
    - callKind: "'live' | 'verification'"
  external_services:
    - Supabase PostgreSQL
    - PostHog (best-effort, non-blocking)
  env_vars:
    - SUPABASE_URL
    - SUPABASE_SERVICE_ROLE_KEY
    - POSTHOG_API_KEY (optional)
    - BILLING_CALL_BASED_V1 (feature flag)
    - TRIAL_EXPERIENCE_V1 (feature flag)
  tables_read:
    - accounts
    - plans
    - profiles
    - verification_call_allowlist
  tables_written:
    - accounts (rejected_daytime_calls, ceiling_reject_sent counters)
  failure_paths:
    - account not found → allowed:false
    - account suspended/disabled/cancelled → allowed:false
    - trial expired → allowed:false
    - trial live call cap (15) reached → allowed:false
    - trial verification call cap (3) reached → allowed:false
    - night_weekend plan during business hours → allowed:false
    - call-based hard cap reached → allowed:false
    - call-based soft_cap buffer exhausted → allowed:false
    - legacy minute ceiling reached → allowed:false
  logs_events:
    - PostHog call classification events (best-effort)
    - structured logs via logInfo/logError

- name: vapi-webhook
  path: supabase/functions/vapi-webhook/index.ts
  jwt: explicit_false
  purpose: Inbound Vapi webhook; logs completed calls and updates billing ledger
  method: POST
  inputs:
    body:
      - message.type: call-started | end-of-call-report | status-update
      - message.call: Vapi call object (accountId, duration, transcript, provider_call_id)
  outputs:
    - "200 OK: { status: 200, message: 'OK' }"
  external_services:
    - Supabase PostgreSQL
    - PostHog (best-effort)
    - Sentry (withSentryEdge wrapper)
  env_vars:
    - SUPABASE_URL
    - SUPABASE_SERVICE_ROLE_KEY
    - POSTHOG_API_KEY (optional)
    - SENTRY_DSN (optional)
  tables_read:
    - accounts
    - phone_numbers
  tables_written:
    - call_logs
    - call_billing_ledger (idempotent on provider_call_id)
    - billing_period_usage_summary
  failure_paths:
    - invalid event structure → 200 OK (graceful)
    - account not found → logged, entry created with null account_id
    - classification failure → fallback classification
  logs_events:
    - PostHog call classification events
    - Sentry error boundaries

