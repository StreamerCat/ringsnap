## PHONE NUMBER PROVISIONING & LIFECYCLE

- name: provision-resources
  path: supabase/functions/provision-resources/index.ts
  jwt: explicit_false
  purpose: Main provisioning orchestrator; called internally after onboarding completes
  method: POST
  inputs:
    body:
      - accountId: UUID
      - email, name, phone: user details
      - selectedNumber: chosen phone number
      - companyName, defaultAvailability: account setup data
  outputs: "{ ok: true } or error"
  external_services: [invokes provision-vapi, provision-phone-number edge functions]
  env_vars: [SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY]
  tables_read: [accounts, profiles]
  tables_written: [accounts (provisioning_status), phone_numbers, assistants]
  failure_paths:
    - sub-function failure → provisioning_status=failed
  logs_events: [structured logs, observability context]

- name: provision
