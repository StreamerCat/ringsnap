  external_services: [Twilio REST API via _shared/telephony.ts]
  env_vars:
    - TWILIO_ACCOUNT_SID
    - TWILIO_AUTH_TOKEN
    - TWILIO_PROVISION_MODE (set to "test" for magic number +15005550006)
