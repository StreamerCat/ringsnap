## STRIPE BILLING & SUBSCRIPTIONS

- name: stripe-webhook
  path: supabase/functions/stripe-webhook/index.ts
  jwt: explicit_false
  purpose: Process Stripe webhook events for subscription and billing lifecycle
  method: POST
  inputs:
    headers: [stripe-signature]
    body: Stripe event JSON
  outputs: "{ received: true } (200)"
  external_services: [Stripe API (signature verification)]
  env_vars: [STRIPE_SECRET_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, POSTHOG_API_KEY]
  tables_read: [accounts (by stripe_customer_id)]
  tables_written: [accounts, stripe_events, subscriptions]
  failure_paths:
    - invalid signature → 403
    - unknown event type → 200 OK (ignored)
    - customer not found → logged, no error
  events_handled:
    - checkout.session.completed → update plan_key, subscription_status, stripe_customer_id
    - customer.subscription.updated → sync status and plan
    - "customer.subscription.deleted → mark cancelled ⚠️ NO EMAIL SENT (risk C2)"
    - "invoice.payment_failed → mark past_due ⚠️ NO EMAIL SENT (risk C1)"
    - "invoice.upcoming → charge Stripe overage ⚠️ DOUBLE-BILLING RISK if webhook retries between Stripe call and DB update (risk C3)"
  logs_events:
    - stripe_events table (audit)
    - PostHog billing analytics
    - structured logs

