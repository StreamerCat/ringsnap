[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  # Stripe publishable key is meant to be public; tell Netlify not to treat it as a secret
  SECRETS_SCAN_OMIT_KEYS = "VITE_STRIPE_PUBLISHABLE_KEY"
  # Sentry release tagging using Netlify's commit reference
  VITE_SENTRY_RELEASE = "${COMMIT_REF}"

# Optional: Install Netlify's Sentry Build Plugin for automatic source map upload
# Run: netlify plugins:install netlify-plugin-sentry
# Or add to netlify.toml:
#
# [[plugins]]
#   package = "netlify-plugin-sentry"
#   [plugins.inputs]
#     sentryOrg = "your-sentry-org"
#     sentryProject = "your-sentry-project"
#     sentryAuthToken = "${SENTRY_AUTH_TOKEN}"  # Set as Netlify env var

# Headers for better SEO and caching
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-core.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-resources.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-compare.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/markdown"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/ai.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages - no caching to ensure fresh content
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Prerendered marketing pages - light caching for better performance
# Note: patterns match the exact page path (no trailing wildcard) so the header
# applies to the canonical URL that Googlebot actually crawls (e.g. /pricing, not /pricing/*).
[[headers]]
  for = "/pricing"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/difference"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/plumbers"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/hvac"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/electricians"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/roofing"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/privacy"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/terms"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/resources/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Note: Redirects are handled in public/_redirects file
# This keeps routing configuration in one place and is easier to maintain
# Build trigger: Wed Jan 28 20:40:21 MST 2026
